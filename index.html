<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Player</title>
<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: black;
    overflow: hidden;
}
iframe {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
}
</style>
</head>
<body>

<iframe
    src="https://www.youtube.com/embed/2qBlE2-WL60?autoplay=1&mute=1&playsinline=1&enablejsapi=1&rel=0"
    allow="autoplay; fullscreen; encrypted-media"
    allowfullscreen>
</iframe>

</body>
</html>
